<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808;
  --white: #ffffff;
  --white-dim: rgba(255,255,255,0.55);
  --white-ghost: rgba(255,255,255,0.05);
  --accent: #E8686A;
  --mono: 'DM Mono', 'Courier New', monospace;
  --sans: 'Figtree', 'Arial Black', sans-serif;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--sans);
  font-weight: 400;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.5rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--white-ghost);
}
.nav-logo { font-family: var(--mono); font-size: 13px; color: var(--white-dim); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 10px; }
.nav-logo:hover { color: var(--white); }
.nav-logo:hover .nav-avatar { transform: scale(1.08); }
.nav-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.12); }
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; background: #080808; }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--white-dim); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--white); }

/* HERO — 上下左右完全居中 */
.hero {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 5vw 0;   /* 60px 为 nav 高度补偿 */
}

.hero-inner {
  display: grid;
  grid-template-columns: 1fr 360px;
  align-items: center;
  gap: 5vw;
  width: 100%;
  max-width: 1100px;
}

.hero-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 2rem; opacity: 0; transform: translateY(10px); animation: fadeUp 0.7s ease 0.1s forwards; }
.hero-headline { font-weight: 900; line-height: 1.0; letter-spacing: -0.035em; margin-bottom: 2rem; }
.h-line-1 { font-size: clamp(2.2rem, 4.8vw, 4.2rem); color: rgba(255,255,255,0.18); display: block; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease 0.2s forwards; }
.h-line-2 { font-size: clamp(2.2rem, 4.8vw, 4.2rem); color: rgba(255,255,255,0.50); display: block; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease 0.35s forwards; }
.h-line-3 { font-size: clamp(2.2rem, 4.8vw, 4.2rem); color: #ffffff; display: block; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease 0.5s forwards; }
.hero-sub { margin-bottom: 2.5rem; opacity: 0; transform: translateY(10px); animation: fadeUp 0.7s ease 0.7s forwards; }
.hero-sub p { font-size: clamp(0.9rem, 1.5vw, 1rem); font-weight: 300; color: var(--white-dim); font-style: italic; line-height: 1.5; }
.hero-cta { display: flex; align-items: center; gap: 2rem; opacity: 0; transform: translateY(10px); animation: fadeUp 0.7s ease 0.9s forwards; }
.btn-primary { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.85rem 1.6rem; background: var(--white); color: var(--bg); font-family: var(--sans); font-weight: 700; font-size: 13px; letter-spacing: 0.03em; text-decoration: none; border-radius: 10px; transition: background 0.2s, transform 0.2s; }
.btn-primary:hover { background: rgba(255,255,255,0.88); transform: translateY(-1px); }
.btn-ghost { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--white-dim); text-decoration: none; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
.btn-ghost:hover { color: var(--white); border-color: var(--white-dim); }
.hero-keywords { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.75); text-transform: uppercase; margin-top: 1.5rem; opacity: 0; animation: fadeUp 0.7s ease 1.1s forwards; }

.hero-right { position: relative; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(16px); animation: fadeUp 0.9s ease 0.6s forwards; }
.avatar-img { width: 100%; max-width: 340px; filter: drop-shadow(0 0 30px rgba(232,104,106,0.12)); position: relative; z-index: 2; }

/* Sparkles — behind avatar */
#sparkles-hero { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; z-index: 1; }
#sparkles-hero canvas { position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; }
.sparkles-fade { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; z-index: 1; pointer-events: none; background: radial-gradient(ellipse 220px 220px at center, transparent 40%, var(--bg) 100%); }

@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* Hamburger */
.nav-burger { display: none; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 22px; cursor: pointer; padding: 4px 8px; line-height: 1; }

/* Page transition */
.page-transition { position: fixed; inset: 0; background: #080808; z-index: 9999; pointer-events: none; }
.page-transition::after { content: ''; position: absolute; inset: 0; background: #080808; transform: scaleX(1); transform-origin: right; transition: transform 0.45s cubic-bezier(0.86, 0, 0.07, 1); }
.page-transition.done::after { transform: scaleX(0); }

@media (max-width: 780px) {
  .hero { padding: 0 1.5rem; }
  .hero-inner { grid-template-columns: 1fr; padding-top: 80px; text-align: center; }
  .hero-right { margin-top: 2rem; }
  .avatar-img { max-width: 180px; }
  #sparkles-hero { width: 260px; height: 260px; }
  .sparkles-fade { width: 260px; height: 260px; background: radial-gradient(ellipse 120px 120px at center, transparent 40%, var(--bg) 100%); }
  .hero-cta { justify-content: center; }
  .hero-keywords { text-align: center; }
  html, body { height: auto; overflow: auto; }
  .hero { position: relative; }
  nav { padding: 1.2rem 1.5rem; }
  .nav-burger { display: block; }
  .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(8,8,8,0.95); backdrop-filter: blur(12px); flex-direction: column; padding: 1rem 2rem; gap: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .nav-links.open { display: flex; }
  .nav-links a { font-size: 10px; }
}
</style>

<div class="hero">

        <span class="h-line-1">Entre deux mondes,</span>

        <a href="projets.html" class="btn-primary">Voir ce que je construis →</a>
        <a href="https://www.linkedin.com/in/weilin-b-b68416303/" target="_blank" class="btn-ghost">LinkedIn</a>
      </div>

    </div>
    <div class="hero-right">
      <div id="sparkles-hero"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
<script>
tsParticles.load("sparkles-hero", {
  background: { color: { value: "transparent" } },
  fullScreen: { enable: false },
  fpsLimit: 120,
  particles: {
    color: { value: "#ffffff" },
    move: {
      enable: true,
      direction: "none",
      outModes: { default: "out" },
      speed: { min: 0.1, max: 0.8 },
    },
    number: {
      density: { enable: true, area: 200 },
      value: 400,
    },
    opacity: {
      value: { min: 0.15, max: 1 },
      animation: { enable: true, speed: 2, sync: false, startValue: "random" },
    },
    shape: { type: "circle" },
    size: {
      value: { min: 0.6, max: 2 },
    },
  },
  detectRetina: true,
});
</script>
<div class="page-transition" id="pt"></div>
<script>
// Hamburger menu
const burger = document.querySelector('.nav-burger');
if (burger) burger.addEventListener('click', () => document.querySelector('.nav-links').classList.toggle('open'));
// Page transition: fade in on load
window.addEventListener('load', () => document.getElementById('pt').classList.add('done'));
// Fade out on navigate
document.querySelectorAll('a[href]').forEach(a => {
  if (a.hostname === location.hostname && !a.href.includes('#') && a.target !== '_blank') {
    a.addEventListener('click', e => {
      e.preventDefault();
      const pt = document.getElementById('pt');
      pt.classList.remove('done');
      setTimeout(() => window.location = a.href, 350);
    });
  }
});
</script>
