<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weilin Hu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,900;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #080808;
    --white: #ffffff;
    --white-dim: rgba(255,255,255,0.55);
    --white-ghost: rgba(255,255,255,0.05);
    --accent: #E8686A;
    --mono: 'DM Mono', 'Courier New', monospace;
    --sans: 'Figtree', 'Arial Black', sans-serif;
  }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--white); font-family: var(--sans); font-weight: 400; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.5rem 2.5rem; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--white-ghost);
  }
  .nav-logo { font-family: var(--mono); font-size: 13px; color: var(--white-dim); text-decoration: none; transition: color 0.2s; }
  .nav-logo:hover { color: var(--white); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--white-dim); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }

  /* HERO */
  .hero {
    position: fixed; inset: 0; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 420px;
    align-items: center;
    padding: 0 2.5rem;
    padding-top: 70px;
    max-width: 1100px;
    gap: 2rem;
  }

  .hero-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 2rem; opacity: 0; transform: translateY(10px); animation: fadeUp 0.7s ease 0.1s forwards; }

  .hero-headline { font-weight: 900; line-height: 1.0; letter-spacing: -0.035em; margin-bottom: 2rem; }
  .h-line-1 { font-size: clamp(2.4rem, 5.5vw, 4.4rem); color: rgba(255,255,255,0.18); display: block; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease 0.2s forwards; }
  .h-line-2 { font-size: clamp(2.4rem, 5.5vw, 4.4rem); color: rgba(255,255,255,0.50); display: block; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease 0.35s forwards; }
  .h-line-3 { font-size: clamp(2.4rem, 5.5vw, 4.4rem); color: #ffffff; display: block; opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease 0.5s forwards; }

  .hero-sub { margin-bottom: 2.5rem; opacity: 0; transform: translateY(10px); animation: fadeUp 0.7s ease 0.7s forwards; }
  .hero-sub p { font-size: clamp(0.9rem, 1.6vw, 1.05rem); font-weight: 300; color: var(--white-dim); font-style: italic; line-height: 1.5; }

  .hero-cta { display: flex; align-items: center; gap: 2rem; opacity: 0; transform: translateY(10px); animation: fadeUp 0.7s ease 0.9s forwards; }

  .btn-primary { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.85rem 1.6rem; background: var(--white); color: var(--bg); font-family: var(--sans); font-weight: 700; font-size: 13px; letter-spacing: 0.03em; text-decoration: none; border-radius: 10px; transition: background 0.2s, transform 0.2s; }
  .btn-primary:hover { background: rgba(255,255,255,0.88); transform: translateY(-1px); }

  .btn-ghost { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--white-dim); text-decoration: none; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
  .btn-ghost:hover { color: var(--white); border-color: var(--white-dim); }

  .hero-keywords { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.75); text-transform: uppercase; margin-top: 1.5rem; opacity: 0; animation: fadeUp 0.7s ease 1.1s forwards; }

  /* AVATAR */
  .hero-right {
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: translateY(16px);
    animation: fadeUp 0.9s ease 0.6s forwards;
  }
  .avatar-img {
    width: 340px; max-width: 100%;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 0 30px rgba(232,104,106,0.12));
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 780px) {
    .hero { grid-template-columns: 1fr; padding: 0 1.5rem; padding-top: 80px; }
    .hero-right { display: none; }
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { gap: 1.2rem; }
    .nav-links a { font-size: 10px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">weilin.hu</a>
  <ul class="nav-links">
    <li><a href="projets.html">Projets</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-left">
    <p class="hero-tag">Bordeaux, France — 2026</p>
    <h1 class="hero-headline">
      <span class="h-line-1">Entre deux mondes,</span>
      <span class="h-line-2">j'apprends à construire</span>
      <span class="h-line-3">le troisième.</span>
    </h1>
    <div class="hero-sub">
      <p>Quelque chose s'est transformé.</p>
      <p>J'écris ce chemin ici.</p>
    </div>
    <div class="hero-cta">
      <a href="projets.html" class="btn-primary">Voir ce que je construis →</a>
      <a href="https://www.linkedin.com/in/weilin-b-b68416303/" target="_blank" class="btn-ghost">LinkedIn</a>
    </div>
    <p class="hero-keywords">Automatisation · Workflows IA · E-commerce</p>
  </div>

  <div class="hero-right">
    <img src="avatar.png" alt="Weilin Hu" class="avatar-img">
  </div>
</div>

</body>
</html>
